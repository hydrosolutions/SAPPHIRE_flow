# SAPPHIRE Flow — production base config (no internal ports exposed).
# For local dev, add the dev overlay to expose postgres, prefect, and API ports:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  postgres:
    image: postgis/postgis:16-3.4@sha256:44126d872ac91993766c341e369c539e8196614321765d36a6f1bab0419a5fa5  # postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${DB_USER:-sapphire}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: sapphire
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sapphire}"]
      interval: 10s
      timeout: 5s
      retries: 5
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_OVERRIDE
    secrets:
      - db_password
    restart: unless-stopped
    networks: [backend]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  prefect-server:
    image: prefecthq/prefect:3-python3.11@sha256:369d8f0bb1fbf84c28b90d9af62dea8ef1b90d261fbc321f211dbba96883613c  # prefecthq/prefect:3-python3.11
    command: >
      sh -c "
        export PREFECT_API_DATABASE_CONNECTION_URL=\"postgresql+asyncpg://${DB_USER:-sapphire}:$$(cat /run/secrets/db_password)@postgres:5432/prefect\" &&
        prefect server start --host 0.0.0.0
      "
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health', timeout=5)\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    cap_drop:
      - ALL
    secrets:
      - db_password
    restart: unless-stopped
    networks: [backend, frontend]
    volumes:
      - prefect_data:/data/prefect
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  prefect-worker:
    build: .
    image: sapphire-flow:${VERSION:?VERSION is required; set in .env or export before compose up}
    command: prefect worker start --pool default --type process
    # Plan 086: bound the blast radius of an over-budget NWP-on forecast cycle.
    # An over-limit run is cgroup-killed INSIDE this container (still a SIGKILL)
    # instead of the host OOM killer taking an arbitrary host process — this
    # bounds blast radius, it is NOT a graceful failure. Sized 8 GiB: above the
    # 4 GiB tmpfs working set (/tmp/sapphire_nwp) + worker base, below the
    # ~15.84 GiB VM. A value near 4 GiB would risk killing normal runs because
    # of the tmpfs staging working set (see Plan 086 D8 / Open Item D).
    mem_limit: 8g
    environment:
      SAPPHIRE_DATA_DIR: /data
      SAPPHIRE_CONFIG: /app/config.toml
      DATABASE_URL_TEMPLATE: postgresql+psycopg://${DB_USER:-sapphire}@postgres:5432/sapphire
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_LOGGING_LEVEL: WARNING
    depends_on:
      prefect-server:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - FOWNER
    secrets:
      - db_password
    read_only: true
    tmpfs:
      - /tmp
      - /data/cache
    restart: unless-stopped
    networks: [backend]
    volumes:
      - model_artifacts:/data/artifacts:rw
      - backups:/data/backups:rw
      - nwp_grids:/data/nwp_grids:rw
      - bafu_forecast_archive:/data/bafu_forecasts:rw
      - ./config.toml:/app/config.toml:ro
      - type: tmpfs
        target: /tmp/sapphire_nwp
        tmpfs:
          size: 4294967296
          mode: 1023
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Dedicated obs-ingest worker (Plan 098): serves only the `ingest` pool so the
  # 5-minute observation cadence cannot be starved by long forecast/NWP runs on
  # the shared `default` worker.
  prefect-worker-ingest:
    build: .
    image: sapphire-flow:${VERSION:?VERSION is required; set in .env or export before compose up}
    command: prefect worker start --pool ingest --type process
    mem_limit: 512m
    environment:
      SAPPHIRE_DATA_DIR: /data
      SAPPHIRE_CONFIG: /app/config.toml
      DATABASE_URL_TEMPLATE: postgresql+psycopg://${DB_USER:-sapphire}@postgres:5432/sapphire
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_LOGGING_LEVEL: WARNING
    depends_on:
      prefect-server:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - FOWNER
    secrets:
      - db_password
    read_only: true
    tmpfs:
      - /tmp
      - /data/cache
      - /data/artifacts
      - /data/raw
    restart: unless-stopped
    networks: [backend]
    volumes:
      - ./config.toml:/app/config.toml:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  api:
    build: .
    image: sapphire-flow:${VERSION:?VERSION is required; set in .env or export before compose up}
    command: uvicorn sapphire_flow.api:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL_TEMPLATE: postgresql+psycopg://${DB_USER:-sapphire}@postgres:5432/sapphire
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_UI_URL: http://prefect-server:4200
      SAPPHIRE_DATA_DIR: /data
      # v0 only: default * is acceptable (no auth, test server).
      # Restrict to explicit origin list before v1 (security.md § CORS policy).
      SAPPHIRE_CORS_ORIGINS: ${SAPPHIRE_CORS_ORIGINS:-*}
    depends_on:
      postgres:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=5)\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - FOWNER
    secrets:
      - db_password
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
    networks: [backend, frontend]
    volumes:
      - model_artifacts:/data/artifacts:ro
      - ./config.toml:/app/config.toml:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  caddy:
    image: caddy:2.11.4@sha256:af5fdcd76f2db5e4e974ee92f96ee8c0fc3edb55bd4ba5032547cbf3f65e486d  # caddy:2.11.4
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # caddy:2.9 is Alpine-based and ships no curl; use busybox wget.
      # Probe the proxied API health route (caddy reverse_proxies all to
      # api:8000), which returns 200 — wget exits non-zero on non-2xx.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "-T", "5", "http://localhost:80/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
    networks: [frontend]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  init:
    build: .
    image: sapphire-flow:${VERSION:?VERSION is required; set in .env or export before compose up}
    command: >
      sh -c "
        alembic upgrade head &&
        python -m sapphire_flow.cli.register_deployments &&
        echo 'Init complete'
      "
    environment:
      DATABASE_URL_TEMPLATE: postgresql+psycopg://${DB_USER:-sapphire}@postgres:5432/sapphire
      PREFECT_API_URL: http://prefect-server:4200/api
      SCHEDULE_INGEST_OBSERVATIONS: ${SCHEDULE_INGEST_OBSERVATIONS:-*/5 * * * *}
      SCHEDULE_FORECAST_CYCLE: ${SCHEDULE_FORECAST_CYCLE:-0 */6 * * *}
      SCHEDULE_BACKUP_DATABASE: ${SCHEDULE_BACKUP_DATABASE:-0 2 * * *}
      SCHEDULE_INGEST_WEATHER_HISTORY: ${SCHEDULE_INGEST_WEATHER_HISTORY:-0 6 * * *}
    depends_on:
      postgres:
        condition: service_healthy
      prefect-server:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - FOWNER
    secrets:
      - db_password
    read_only: true
    tmpfs:
      - /tmp
    restart: "no"
    networks: [backend]
    volumes:
      - ./config.toml:/app/config.toml:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  model_artifacts:
  prefect_data:
  backups:
  nwp_grids: {}
  bafu_forecast_archive: {}  # Plan 111 route-C collector — quarantined forecast archive

secrets:
  db_password:
    file: ./secrets/db_password
  # Nepal v1: the recap Data Gateway API key (`sapphire_dg_api_key`) is NOT
  # declared here. It is a Nepal-only secret provided by the
  # `docker-compose.recap.yml` overlay (Plan 082 Task 2A). Swiss deployments
  # never construct the Recap adapters (Task 2C/2D `type` selector) and need
  # no `./secrets/sapphire_dg_api_key` file at all.

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
