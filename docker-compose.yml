# SAPPHIRE Flow — production base config (no internal ports exposed).
# For local dev, add the dev overlay to expose postgres, prefect, and API ports:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${DB_USER:-sapphire}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: sapphire
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sapphire}"]
      interval: 10s
      timeout: 5s
      retries: 5
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_OVERRIDE
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  prefect-server:
    image: prefecthq/prefect:3-python3.11
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${DB_USER:-sapphire}:${DB_PASSWORD}@postgres:5432/prefect
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4200/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
    cap_drop:
      - ALL
    restart: unless-stopped
    volumes:
      - prefect_data:/data/prefect
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  prefect-worker:
    build: .
    image: sapphire-flow:${VERSION:-latest}
    command: prefect worker start --pool default --type process
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-sapphire}:${DB_PASSWORD}@postgres:5432/sapphire
      PREFECT_API_URL: http://prefect-server:4200/api
    depends_on:
      prefect-server:
        condition: service_healthy
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
    volumes:
      - model_artifacts:/data/artifacts:rw
      - ./config.toml:/app/config.toml:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  api:
    build: .
    image: sapphire-flow:${VERSION:-latest}
    command: uvicorn sapphire_flow.api:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-sapphire}:${DB_PASSWORD}@postgres:5432/sapphire
      PREFECT_API_URL: http://prefect-server:4200/api
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
    volumes:
      - model_artifacts:/data/artifacts:ro
      - ./config.toml:/app/config.toml:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  caddy:
    image: caddy:2
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      prefect-server:
        condition: service_healthy
    cap_drop:
      - ALL
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  init:
    build: .
    image: sapphire-flow:${VERSION:-latest}
    command: >
      sh -c "
        alembic upgrade head &&
        echo 'Init complete'
      "
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-sapphire}:${DB_PASSWORD}@postgres:5432/sapphire
      PREFECT_API_URL: http://prefect-server:4200/api
    depends_on:
      postgres:
        condition: service_healthy
      prefect-server:
        condition: service_healthy
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: "no"
    volumes:
      - ./config.toml:/app/config.toml:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  model_artifacts:
  prefect_data:
