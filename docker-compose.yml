# SAPPHIRE Flow — production base config (no internal ports exposed).
# For local dev, add the dev overlay to expose postgres, prefect, and API ports:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${DB_USER:-sapphire}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: sapphire
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sapphire}"]
      interval: 10s
      timeout: 5s
      retries: 5
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_OVERRIDE
    secrets:
      - db_password
    restart: unless-stopped
    networks: [backend]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  prefect-server:
    image: prefecthq/prefect:3-python3.11
    command: >
      sh -c "
        export PREFECT_API_DATABASE_CONNECTION_URL=\"postgresql+asyncpg://${DB_USER:-sapphire}:$$(cat /run/secrets/db_password)@postgres:5432/prefect\" &&
        prefect server start --host 0.0.0.0
      "
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health', timeout=5)\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    cap_drop:
      - ALL
    secrets:
      - db_password
    restart: unless-stopped
    networks: [backend, frontend]
    volumes:
      - prefect_data:/data/prefect
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  prefect-worker:
    build: .
    image: sapphire-flow:${VERSION:-latest}
    command: prefect worker start --pool default --type process
    environment:
      SAPPHIRE_DATA_DIR: /data
      SAPPHIRE_CONFIG: /app/config.toml
      DATABASE_URL_TEMPLATE: postgresql+psycopg://${DB_USER:-sapphire}@postgres:5432/sapphire
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_LOGGING_LEVEL: WARNING
    depends_on:
      prefect-server:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    secrets:
      - db_password
    read_only: true
    tmpfs:
      - /tmp
      - /data/cache
    restart: unless-stopped
    networks: [backend]
    volumes:
      - model_artifacts:/data/artifacts:rw
      - sapphire_data:/data/raw:rw
      - backups:/data/backups:rw
      - ./config.toml:/app/config.toml:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  api:
    build: .
    image: sapphire-flow:${VERSION:-latest}
    command: uvicorn sapphire_flow.api:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL_TEMPLATE: postgresql+psycopg://${DB_USER:-sapphire}@postgres:5432/sapphire
      PREFECT_API_URL: http://prefect-server:4200/api
      SAPPHIRE_DATA_DIR: /data
      # v0 only: default * is acceptable (no auth, test server).
      # Restrict to explicit origin list before v1 (security.md § CORS policy).
      SAPPHIRE_CORS_ORIGINS: ${SAPPHIRE_CORS_ORIGINS:-*}
    depends_on:
      postgres:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=5)\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    secrets:
      - db_password
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
    networks: [backend, frontend]
    volumes:
      - model_artifacts:/data/artifacts:ro
      - ./config.toml:/app/config.toml:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  caddy:
    image: caddy:2.9
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
    networks: [frontend]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  init:
    build: .
    image: sapphire-flow:${VERSION:-latest}
    command: >
      sh -c "
        alembic upgrade head &&
        python -m sapphire_flow.cli.register_deployments &&
        echo 'Init complete'
      "
    environment:
      DATABASE_URL_TEMPLATE: postgresql+psycopg://${DB_USER:-sapphire}@postgres:5432/sapphire
      PREFECT_API_URL: http://prefect-server:4200/api
      SCHEDULE_INGEST_OBSERVATIONS: ${SCHEDULE_INGEST_OBSERVATIONS:-*/30 * * * *}
      SCHEDULE_FORECAST_CYCLE: ${SCHEDULE_FORECAST_CYCLE:-0 */6 * * *}
      SCHEDULE_BACKUP_DATABASE: ${SCHEDULE_BACKUP_DATABASE:-0 2 * * *}
    depends_on:
      postgres:
        condition: service_healthy
      prefect-server:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    secrets:
      - db_password
    read_only: true
    tmpfs:
      - /tmp
    restart: "no"
    networks: [backend]
    volumes:
      - ./config.toml:/app/config.toml:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  model_artifacts:
  prefect_data:
  sapphire_data:
  backups:

secrets:
  db_password:
    file: ./secrets/db_password

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
