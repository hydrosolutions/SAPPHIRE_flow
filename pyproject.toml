[project]
name = "sapphire-flow"
version = "0.1.136"
description = "Add your description here"
readme = "README.md"
license = "MIT"
authors = [
    { name = "Beatrice Marti", email = "mabesa@users.noreply.github.com" }
]
requires-python = ">=3.11"
dependencies = [
    "alembic",
    "camelsch>=0.2.0",
    "geoalchemy2>=0.18.4",
    "orjson",
    "platformdirs>=4.0",
    "polars",
    "prefect>=3.0",
    "psycopg[binary]>=3.3.3",
    "pydantic>=2.12.5",
    "shapely",
    "sqlalchemy>=2.0",
    "structlog>=24.1.0",
    "xarray",
]

[build-system]
requires = ["uv_build>=0.9.13,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "asyncpg",
    "bump-my-version>=1.2.7",
    "kaleido>=1.2.0",
    "nbformat>=5.10.4",
    "notebook>=7.5.5",
    "plotly>=6.6.0",
    "pyright",
    "pytest>=9.0.2",
    "pytest-asyncio",
    "pytest-cov>=7.0.0",
    "ruff>=0.15.5",
    "testcontainers[postgres]",
]

[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "A", "SIM", "TCH", "T20"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.bumpversion]
current_version = "0.1.136"
commit = false
tag = false
allow_dirty = true

[[tool.bumpversion.files]]
filename = "pyproject.toml"
search = 'version = "{current_version}"'
replace = 'version = "{new_version}"'

[[tool.bumpversion.files]]
filename = "src/sapphire_flow/__init__.py"
search = '__version__ = "{current_version}"'
replace = '__version__ = "{new_version}"'
