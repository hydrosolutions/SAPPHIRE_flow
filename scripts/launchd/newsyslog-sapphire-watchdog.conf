# SAPPHIRE Flow — watchdog log rotation for newsyslog(8).
#
# OPERATOR ACTION REQUIRED: this file is a template. newsyslog reads
# configuration from /etc/newsyslog.d/*.conf — a system-protected
# directory. Copy this file into place with sudo:
#
#   sudo cp scripts/launchd/newsyslog-sapphire-watchdog.conf \
#     /etc/newsyslog.d/sapphire-watchdog.conf
#   sudo chown root:wheel /etc/newsyslog.d/sapphire-watchdog.conf
#   sudo chmod 644 /etc/newsyslog.d/sapphire-watchdog.conf
#
# Verify with: sudo newsyslog -v
#
# Fields (see `man newsyslog.conf`):
#   logfilename   owner:group   mode  count  size(KB)  when  flags
# Here: 7 rotations, rotate when log >= 1024 KB (1 MB), bzip2 ('J').

/Users/sapphire/Library/Logs/sapphire-watchdog.log  sapphire:staff  640  7  1024  *  J
