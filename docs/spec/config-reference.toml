# =============================================================================
# Adapter configuration — per-adapter sections
# NOT part of DeploymentConfig. Loaded separately by each adapter.
# Source: conventions.md § Adapter registration
# =============================================================================

[adapters.weather_forecast]
type = "meteoswiss_nwp"               # maps to MeteoSwissNwpAdapter class
archive = true                        # permanently store all NWP data
max_cache_age_hours = 12

# Pipeline monitoring config for this adapter.
# Source: architecture-context.md § Pipeline monitoring schedule config
[adapters.weather_forecast.monitoring]
expected_delivery_offset_hours = 5.0  # ICON-CH2-EPS available ~5h after cycle
expected_cycles_per_day = 4           # 00, 06, 12, 18 UTC
provider_retention_days = 7           # how long provider keeps data (for gap recovery)
recovery_max_attempts = 3             # max re-fetch attempts per cycle

[adapters.weather_stations]
type = "meteoswiss_smn"               # maps to MeteoSwissSmnAdapter class
max_cache_age_hours = 24

[adapters.weather_stations.monitoring]
expected_interval_hours = 0.17        # SMN: every 10 min

[adapters.river_stations]
type = "hydro_scraper"                # maps to HydroScraperAdapter class
endpoint = "https://lindas.admin.ch/query"  # LINDAS SPARQL endpoint (public, no auth)
max_cache_age_hours = 24

[adapters.river_stations.monitoring]
expected_interval_hours = 0.17        # BAFU: every 10 min


# =============================================================================
# Monitoring — pipeline-level (not per-adapter)
# Source: architecture-context.md § Pipeline monitoring schedule config
# =============================================================================

[monitoring.forecast_cycle]
expected_interval_hours = 6.0         # how often Flow 1 should complete


# =============================================================================
# Logging — application-level logging configuration
# Source: docs/standards/logging.md § Configuration
# =============================================================================

[logging]
level = "INFO"                               # Root log level. Per-module override: env var SAPPHIRE_LOG_{MODULE}=DEBUG


# =============================================================================
# Model weather source configuration — per model
# Source: architecture-context.md § Model weather source configuration
# =============================================================================

[models.lstm_daily.weather]
sources = [
  {nwp_source = "icon_ch2_eps", parameters = ["precipitation", "temperature", "snow_depth"], pipeline = ["extract_basin_avg"]},
]


# =============================================================================
# API configuration
# Source: docs/standards/security.md § CORS policy
# =============================================================================

[api.cors]
allow_origins = ["https://sapphire.example.ch"]  # explicit list, never "*"
