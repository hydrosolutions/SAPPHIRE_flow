# SAPPHIRE Flow — config.toml reference
#
# This file documents every config.toml field with its purpose, default value,
# and which design doc defines it. Use v0 Swiss deployment values as examples.
#
# Duration convention: all duration fields use hours (float) unless the field
# name says otherwise. Pydantic validates and converts at load time.
# Rationale: avoids ISO 8601 string parsing; hours are natural for hydrological
# operations (NWP cycles, staleness windows, delivery offsets).
#
# TOML ordering note: bare key-value fields must come before [[array-of-tables]]
# headers. Scalar fields are listed first; array-of-tables sections follow.

# =============================================================================
# DeploymentConfig — scalar fields
# Source: docs/spec/types-and-protocols.md § DeploymentConfig
# Module: config/deployment.py
# =============================================================================

# --- Data retention ---
# Tiered: hot (PostgreSQL) -> cold (Parquet) -> delete at max_retention_days.
# v0: no cold storage (everything stays in PostgreSQL). See v0-scope.md § A2.
# Source: types-and-protocols.md § DeploymentConfig
weather_hot_days = 180          # weather data hot window (raw grids + extracted NWP + observations)
forecast_hot_days = 548         # runoff forecast + hindcast hot window (~1.5 years)
max_retention_days = 3650       # total lifetime for all data (must be set, no default)
# Constraint: max_retention_days > forecast_hot_days (validated at load time)

# --- Observation staleness ---
# Source: types-and-protocols.md § DeploymentConfig
observation_staleness_warning_hours = 6.0  # Flow 1 step 1.6 warning threshold

# --- NWP lateness ---
# Source: types-and-protocols.md § DeploymentConfig, architecture-context.md § NWP lateness fallback
nwp_max_wait_hours = 3.0              # max wait for expected NWP delivery
nwp_max_fallback_age_hours = 12.0     # max age of fallback NWP cycle

# --- Per-source alert enablement ---
# Source: types-and-protocols.md § DeploymentConfig, v0-scope.md § A8c
enable_forecast_alerts = false              # v0: off by default; gates Flow 1 Phase C
enable_observation_alerts = false           # v0: off by default; gates Flow 2 steps 2.8-2.10
enable_pipeline_alerts = false              # v0: off by default; gates Flow 4 steps 4.6-4.7
threshold_check_mode = "raw"               # v0: raw only (no published forecasts)

# --- Multi-model alert strategy ---
# Source: types-and-protocols.md § DeploymentConfig, plan 010
alert_model_strategy = "primary"          # "primary"|"pooled"|"bma"|"consensus"
min_operational_ensemble_size = 20        # minimum members for ensemble forecasts
min_operational_quantile_levels = 7       # minimum quantile levels (must be >= 7)

# --- Warm-up state (conceptual models) ---
# Source: types-and-protocols.md § DeploymentConfig
warm_up_snapshot_max_age_hours = 48.0       # default max age for warm-up snapshot
warm_up_snapshot_max_age_monsoon_hours = 24.0  # shorter during wet season

# --- Input quality assessment (Flow 1 step 1.7) ---
# Source: types-and-protocols.md § InputQualityConfig
[input_quality]
obs_degraded_hours = 12.0                      # observation staleness → DEGRADED (must be > observation_staleness_warning_hours)
nwp_age_partial_hours = 9.0                    # NWP cycle age → PARTIAL
nwp_age_degraded_hours = 11.0                  # NWP cycle age → DEGRADED (must be <= nwp_max_fallback_age_hours)
warmup_snapshot_age_partial_hours = 24.0       # warm-up snapshot age → PARTIAL (default; caller may override per season)
warmup_snapshot_age_degraded_hours = 42.0      # warm-up snapshot age → DEGRADED (must be <= warm_up_snapshot_max_age_hours; for monsoon deployments, caller must cap at warm_up_snapshot_max_age_monsoon_hours)

# --- Flow regime ---
# Source: types-and-protocols.md § DeploymentConfig
flow_regime_p50_percentile = 50.0     # customizable percentile boundary
flow_regime_p90_percentile = 90.0

# --- Threshold inference ---
# Source: types-and-protocols.md § DeploymentConfig
infer_missing_thresholds = false      # v1+ only

# --- Skill promotion ---
# Source: types-and-protocols.md § DeploymentConfig
min_skill_samples = 100               # minimum forecast-observation pairs
min_skill_seasons = 2                 # must cover wet + dry

# --- Display ---
# Source: types-and-protocols.md § DeploymentConfig
default_display_timezone = "Europe/Zurich"

# --- Calendar ---
# Source: types-and-protocols.md § DeploymentConfig
calendar = "gregorian"                # Nepal v1: "bikram_sambat"


# =============================================================================
# DeploymentConfig — array-of-tables sections
# (Must follow all scalar fields due to TOML parsing rules)
# =============================================================================

[paths]
data_dir = "/tmp/sapphire-test-data"

# --- Danger levels (array of tables) ---
# Each entry defines one danger level for threshold-based alerting.
# Source: types-and-protocols.md § DangerLevelDefinition
[[danger_levels]]
level = 1
name = "Low"
color = "#FFFF00"
trigger_probability = 0.5
resolve_probability = 0.3
min_trigger_duration_hours = 0.0
min_resolve_duration_hours = 0.0
direction = "above"

[[danger_levels]]
level = 2
name = "Moderate"
color = "#FFA500"
trigger_probability = 0.5
resolve_probability = 0.3
min_trigger_duration_hours = 0.0
min_resolve_duration_hours = 0.0
direction = "above"

[[danger_levels]]
level = 3
name = "Considerable"
color = "#FF4500"
trigger_probability = 0.4
resolve_probability = 0.2
min_trigger_duration_hours = 0.0
min_resolve_duration_hours = 0.0
direction = "above"

[[danger_levels]]
level = 4
name = "High"
color = "#FF0000"
trigger_probability = 0.3
resolve_probability = 0.15
min_trigger_duration_hours = 0.0
min_resolve_duration_hours = 0.0
direction = "above"

[[danger_levels]]
level = 5
name = "Very High"
color = "#800000"
trigger_probability = 0.2
resolve_probability = 0.1
min_trigger_duration_hours = 0.0
min_resolve_duration_hours = 0.0
direction = "above"

# --- Seasons (array of tables) ---
# Defines seasonal boundaries for skill stratification and warm-up tuning.
# Source: types-and-protocols.md § SeasonDefinition
[[seasons]]
name = "winter"
months = [11, 12, 1, 2, 3]

[[seasons]]
name = "summer"
months = [4, 5, 6, 7, 8, 9, 10]

# --- Skill interpretation (array of tables) ---
# Maps numeric skill score ranges to qualitative labels.
# Source: types-and-protocols.md § SkillInterpretationScheme
# Note: skill_interpretation.bands uses nested [[...]] syntax, so this section
# must be last among DeploymentConfig array-of-tables entries.
[[skill_interpretation]]
metric = "crpss"
time_step_hours = 24.0
[[skill_interpretation.bands]]
lower = -1e99
upper = 0.0
label = "no skill"
[[skill_interpretation.bands]]
lower = 0.0
upper = 0.1
label = "marginal"
[[skill_interpretation.bands]]
lower = 0.1
upper = 0.25
label = "useful"
[[skill_interpretation.bands]]
lower = 0.25
upper = 0.5
label = "good"
[[skill_interpretation.bands]]
lower = 0.5
upper = 1e99
label = "excellent"


# =============================================================================
# QC rule configuration — deployment-level defaults
# Source: types-and-protocols.md § QcRuleSet, QcRuleParams
# Three-layer hierarchy: deployment defaults → per-station overrides → rule versioning
# Time-step dimension: QC service selects thresholds by matching observation parameter
# and time step.
# =============================================================================

[qc_rules]
version = "1.0.0"

# --- Discharge (10-min operational) ---
[[qc_rules.rules]]
rule_id = "range_check"
rule_version = "1.0.0"
parameter = "discharge"
time_step_seconds = 600
thresholds = { value_min = 0.0, value_max = 5000.0 }

[[qc_rules.rules]]
rule_id = "rate_of_change"
rule_version = "1.0.0"
parameter = "discharge"
time_step_seconds = 600
thresholds = { max_rate = 50.0 }   # m³/s per 10 min

[[qc_rules.rules]]
rule_id = "frozen_sensor"
rule_version = "1.0.0"
parameter = "discharge"
time_step_seconds = 600
thresholds = { tolerance = 0.001, min_consecutive = 12.0 }  # 2 hours at 10-min

[[qc_rules.rules]]
rule_id = "spike"
rule_version = "1.0.0"
parameter = "discharge"
time_step_seconds = 600
thresholds = { tolerance = 0.1 }   # fraction of previous value

[[qc_rules.rules]]
rule_id = "gross_outlier"
rule_version = "1.0.0"
parameter = "discharge"
time_step_seconds = 600
thresholds = { k_sigma = 5.0 }

# --- Discharge (daily historical — CAMELS-CH) ---
[[qc_rules.rules]]
rule_id = "range_check"
rule_version = "1.0.0"
parameter = "discharge"
time_step_seconds = 86400
thresholds = { value_min = 0.0, value_max = 5000.0 }

[[qc_rules.rules]]
rule_id = "rate_of_change"
rule_version = "1.0.0"
parameter = "discharge"
time_step_seconds = 86400
thresholds = { max_rate = 500.0 }  # m³/s per day

[[qc_rules.rules]]
rule_id = "frozen_sensor"
rule_version = "1.0.0"
parameter = "discharge"
time_step_seconds = 86400
thresholds = { tolerance = 0.001, min_consecutive = 5.0 }  # 5 days

[[qc_rules.rules]]
rule_id = "spike"
rule_version = "1.0.0"
parameter = "discharge"
time_step_seconds = 86400
thresholds = { tolerance = 0.1 }

[[qc_rules.rules]]
rule_id = "gross_outlier"
rule_version = "1.0.0"
parameter = "discharge"
time_step_seconds = 86400
thresholds = { k_sigma = 5.0 }

# --- Water level (10-min operational) ---
