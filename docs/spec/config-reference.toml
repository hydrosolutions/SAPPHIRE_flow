rule_id = "range_check"
rule_version = "1.0.0"
parameter = "water_level"
time_step_seconds = 600
thresholds = { value_min = -2.0, value_max = 20.0 }  # meters

[[qc_rules.rules]]
rule_id = "rate_of_change"
rule_version = "1.0.0"
parameter = "water_level"
time_step_seconds = 600
thresholds = { max_rate = 0.5 }   # m per 10 min

[[qc_rules.rules]]
rule_id = "frozen_sensor"
rule_version = "1.0.0"
parameter = "water_level"
time_step_seconds = 600
thresholds = { tolerance = 0.001, min_consecutive = 12.0 }

[[qc_rules.rules]]
rule_id = "spike"
rule_version = "1.0.0"
parameter = "water_level"
time_step_seconds = 600
thresholds = { tolerance = 0.1 }

[[qc_rules.rules]]
rule_id = "gross_outlier"
rule_version = "1.0.0"
parameter = "water_level"
time_step_seconds = 600
thresholds = { k_sigma = 5.0 }

# --- Water level (daily — CAMELS-CH lake stations) ---
[[qc_rules.rules]]
rule_id = "range_check"
