<table>
  <thead>
    <tr>
      {% for col in columns %}
      <th>{{ col }}</th>
      {% endfor %}
    </tr>
  </thead>
  <tbody>
    {% for row in rows %}
    <tr>
      {% for val in row %}
      <td title="{{ val }}">{{ val }}</td>
      {% endfor %}
    </tr>
    {% endfor %}
  </tbody>
</table>
<div style="display:flex; gap:1rem; margin-top:0.5rem;">
  {% if page > 0 %}
  <a href="/tables/{{ table_name }}/?page={{ page - 1 }}"
     hx-get="/tables/{{ table_name }}/rows?page={{ page - 1 }}"
     hx-target="#table-wrapper"
     hx-swap="innerHTML"
     role="button" class="outline">&#8592; Previous</a>
  {% endif %}
  {% if has_next %}
  <a href="/tables/{{ table_name }}/?page={{ page + 1 }}"
     hx-get="/tables/{{ table_name }}/rows?page={{ page + 1 }}"
     hx-target="#table-wrapper"
     hx-swap="innerHTML"
     role="button" class="outline">Next &#8594;</a>
  {% endif %}
  <span class="muted" style="align-self:center;">Page {{ page + 1 }}</span>
</div>
