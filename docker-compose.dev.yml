# Development overrides — re-exposes internal service ports for local access.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# This file is NOT auto-merged. Production uses only: docker compose up
#
# Host ports are offset to avoid conflicts with other local services:
#   PostgreSQL: 5438 (container 5432)
#   Prefect UI: 4200 (container 4200)
#   API:        8010 (container 8000)
services:
  postgres:
    ports:
      - "5438:5432"

  prefect-server:
    ports:
      - "4200:4200"

  api:
    ports:
      - "8010:8000"
