name: LINDAS weekly auto-retry

# Auto-retry policy for live-lindas-weekly.yml:
# - Fires only when the parent workflow's SCHEDULED run failed (not manual dispatches).
# - Sleeps 5 minutes between retries (matches BAFU's ~10 min publish cadence —
#   5 min catches each publish cycle twice).
# - Re-dispatches via gh workflow run.
# - Caps at 12 retries per day (= ~1 hour of monitoring = ~6 BAFU publish cycles).
#   If BAFU is broken for longer than that, escalate manually.
#
# Background: BAFU's LINDAS hydro publishing pipeline has an intermittent
# Monday-morning failure window (2026-04-27 succeeded; 2026-05-04 + 2026-05-11
# failed at ~07 UTC, both recovered by ~14 UTC same day). LINDAS publishes new
# observations every ~10 minutes, so most incomplete-publish failures should
# self-correct within 1–6 publish cycles. See
# docs/decisions/bafu-lindas-monday-window.md for evidence + triage.
#
# Cost: ubuntu-latest at ~$0.008/min × ~6 min per cycle (5 min sleep +
# dispatch + workflow run) × max 12 retries/day = ~$0.58 of retry-job time
# + ~$0.84 of dispatched live-lindas-weekly runs = ~$1.42 per Monday incident.

on:
  workflow_run:
    workflows: ["Live LINDAS weekly schema check"]
    types: [completed]

jobs:
  retry:
    name: Retry if scheduled run failed
    runs-on: ubuntu-latest
    # Only retry SCHEDULED failures, not manual workflow_dispatch failures
    # (a manual rerun that fails is an explicit signal, not a transient).
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'schedule'
    permissions:
      actions: write
    timeout-minutes: 10
    steps:
      - name: Cap retries at 12 per day
        id: cap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          today=$(date -u +%Y-%m-%d)
          retries=$(gh run list \
                      --workflow=live-lindas-weekly.yml \
                      --event=workflow_dispatch \
                      --limit 30 \
                      --json createdAt \
                    --repo "${{ github.repository }}" \
                  | jq "[.[] | select(.createdAt | startswith(\"$today\"))] | length")
          echo "retries_today=$retries"
          if [ "$retries" -lt 12 ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "Already retried $retries times today (cap = 12); giving up."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait 5 minutes for BAFU LINDAS to recover
        if: steps.cap.outputs.go == 'true'
        run: sleep 300

      - name: Re-dispatch live-lindas-weekly.yml
        if: steps.cap.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run live-lindas-weekly.yml \
            --ref main \
            --repo "${{ github.repository }}"
