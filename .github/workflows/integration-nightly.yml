name: Integration nightly

# Runs the slow and live (external-API) integration tests excluded from
# default CI. Consolidated into one workflow per Plan 066 A5 Option 1:
# both categories share the same runner, postgres service, and DATABASE_URL,
# so keeping them separate only duplicates boilerplate.

on:
  schedule:
    # Nightly at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  integration-nightly:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4@sha256:44126d872ac91993766c341e369c539e8196614321765d36a6f1bab0419a5fa5  # postgis/postgis:16-3.4
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sapphire_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.7"
          python-version: "3.12"
      - run: uv sync --frozen
      # Run both the slow-marked tests from the main integration tree and
       # every test under tests/integration/live (path-based, so we don't
       # depend on any particular `live*` marker name staying consistent).
      - run: uv run pytest tests/integration/ -v -m "slow" --timeout=1800
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sapphire_test
      - run: uv run pytest tests/integration/live -v --timeout=1800
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sapphire_test
