name: Live LINDAS weekly schema check

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  live-lindas-schema:
    name: Check LINDAS live schema
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run live LINDAS schema check
        run: uv run pytest -m live_lindas -v
