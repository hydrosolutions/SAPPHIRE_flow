# First-fire register (Plan 070 §C2):
#   First successful run (any trigger):  24824715145  (2026-04-23 08:18 UTC, workflow_dispatch)
#   First successful scheduled run:      24980849671  (2026-04-27 06:53 UTC)
# Known external-dependency caveat: BAFU LINDAS publishing-pipeline regression on
# Monday mornings (2026-05-04, 2026-05-11 schedule failures). 2 of 3 observed
# Mondays failed; 1 succeeded (2026-04-27). See
# docs/decisions/bafu-lindas-monday-window.md for the timeline + triage procedure.
# The recurring Monday failure is an upstream BAFU issue, NOT a workflow defect —
# do not act on individual Monday failures as schema drift without first checking
# the BAFU VoID descriptor per the decision record.
name: Live LINDAS weekly schema check

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  live-lindas-schema:
    name: Check LINDAS live schema
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Configure git auth for the private recap-dg-client clone
        run: |
          git config --global url."https://x-access-token:${RECAP_DG_CLIENT_TOKEN}@github.com/hydrosolutions/recap-dg-client.git".insteadOf "https://github.com/hydrosolutions/recap-dg-client.git"
        env:
          RECAP_DG_CLIENT_TOKEN: ${{ secrets.RECAP_DG_CLIENT_TOKEN }}
      - name: Install dependencies
        run: uv sync --frozen

      - name: Run live LINDAS schema check
        run: uv run pytest -m live_lindas -v
