name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - run: uv sync
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run pyright --strict src/

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - run: uv sync
      - run: uv run pytest tests/unit/ --cov=src/sapphire_flow --cov-report=term-missing -v

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sapphire_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - run: uv sync
      - run: uv run pytest tests/integration/ -v
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sapphire_test

  # Phase 11 stub — full end-to-end pipeline test (Docker Compose stack + live pipeline run).
  # Will be implemented in Phase 11 once all pipeline flows are complete.
  e2e:
    needs: [unit, integration]
    runs-on: ubuntu-latest
    steps:
      - run: echo "e2e job is a Phase 11 stub — not yet implemented"
