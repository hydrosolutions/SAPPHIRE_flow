name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.7"
          python-version: "3.12"
      - run: uv sync --frozen
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: shellcheck scripts/launchd/start-sapphire.sh scripts/launchd/watchdog.sh scripts/launchd/install-launchd.sh scripts/bootstrap-mac-mini.sh
      - run: uv run pyright --outputjson src/ > /tmp/pyright.json || true
      - run: uv run python tools/pyright_ratchet.py /tmp/pyright.json tools/pyright_baseline.json
      # A2 — Trivy filesystem scan. Reads uv.lock + pyproject.toml without
      # building the image, so dep-only PRs get fast feedback. Fails on HIGH
      # or CRITICAL vulnerabilities that have an available fix; unfixed CVEs
      # are ignored to avoid blocking on upstream work we cannot action.
      # Known-accepted CVEs live in .trivyignore with dated comments.
      # `skip-dirs: .venv` because `uv sync` ran earlier in this job and
      # trivy would otherwise descend into Prefect's bundled JS UI assets
      # (lodash, vega, ...) — those live inside an installed package and
      # are the image-scan tier's responsibility, not the fs-scan tier's.
      # Equivalent CLI: trivy fs --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed --scanners vuln --skip-dirs .venv .
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          skip-dirs: .venv
          cache: "true"

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.7"
          python-version: "3.12"
      - name: Install system deps for cfgrib / rioxarray / exactextract
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libeccodes0 libexpat1 libgeos-c1v5
      - run: uv sync --frozen
      - run: uv run pytest tests/unit/ --cov=src/sapphire_flow --cov-report=term-missing -v

  # A4 — Wheel-only guard for dependency-update installs.
  #
  # Runs `uv sync --frozen --no-build --no-cache --no-install-project` on
  # GitHub-hosted amd64 to make CI the first execution environment for new
  # dependency versions and to fail if an update introduces new Python
  # build-backend / sdist source execution on this platform. `--no-cache`
  # is required because cached pre-built wheels would otherwise mask a
  # newly-required source build. `--no-install-project` skips the local
  # editable root package (which has no binary distribution by design) so
  # the guard only checks third-party dependencies — the actual target of
  # this control.
  #
  # Runs on every PR and push; the guard is fast enough that scoping to
  # pyproject.toml / uv.lock changes is not necessary. Any merged
  # dependency change is therefore guaranteed to have exercised the guard.
  #
  # Known source-build exception: `exactextract` may require a source build
  # in the linux/arm64 Docker builder path. GitHub-hosted amd64 CI is
  # expected to remain wheel-only; any new exception must be documented in
  # docs/standards/security.md per Plan 064 A4 step 3.
  wheel-only-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.7"
          python-version: "3.12"
          # Disable setup-uv's cache feature in this job: the wheel-only
          # guard uses `uv sync --no-cache`, so no cache directory is
          # populated. setup-uv v8+ errors on missing cache at post-run;
          # explicitly disabling here makes the job v4/v8 compatible
          # (Dependabot PR #4 surfaced this).
          enable-cache: false
      - run: uv sync --frozen --no-build --no-cache --no-install-project

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4@sha256:44126d872ac91993766c341e369c539e8196614321765d36a6f1bab0419a5fa5  # postgis/postgis:16-3.4
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sapphire_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.7"
          python-version: "3.12"
      - name: Install system deps for cfgrib / rioxarray / exactextract
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libeccodes0 libexpat1 libgeos-c1v5
      - run: uv sync --frozen
      - run: uv run pytest tests/integration/ --ignore=tests/integration/live -v -m "not slow"
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sapphire_test

  # B0 + B3 + B4 — Build the app image in CI and scan it in the same job.
  #
  # Why one job: GitHub-hosted jobs run on fresh VMs. A local docker image
  # built in one job is NOT available in another job. So build, trivy image,
  # and syft must share a runner context (or an image tarball must be
  # explicitly uploaded as an artifact and re-loaded). We keep all three
  # steps in this single job for simplicity.
  #
  # The e2e job gates on this job succeeding (see `needs:` below).
  build-image-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      # B0 — Build the image and load it into the local docker daemon so the
      # later trivy and syft steps in this same job can reference the tag.
      - name: Build app image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          tags: sapphire-flow:ci-${{ github.sha }}
          load: true
          push: false
      # B3 — Trivy image scan. Covers OS-level layers the fs scan (A2) does
      # not see. Fails CI on HIGH/CRITICAL unfixed CVEs; SARIF is uploaded
      # as a workflow artifact for audit.
      # Equivalent CLI: trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed sapphire-flow:ci-${{ github.sha }}
      # `limit-severities-for-sarif: true` is required on trivy-action >= v0.36.0:
      # without it the action unsets TRIVY_SEVERITY when writing SARIF (so the SARIF
      # captures all severities for audit), which means `exit-code: 1` fires on any
      # severity instead of just HIGH/CRITICAL. With this flag the SARIF — and the
      # exit-code gate — both honor the configured severity filter.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: sapphire-flow:ci-${{ github.sha }}
          format: sarif
          output: trivy-image.sarif
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          limit-severities-for-sarif: true
          cache: "true"
      - name: Upload Trivy SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: trivy-image-sarif
          path: trivy-image.sarif
          if-no-files-found: warn
      # B4 — SBOM generation. anchore/sbom-action wraps syft; emits
      # CycloneDX JSON for the built image. Uploaded as an artifact on every
      # run so a future CVE landing has a recoverable "which image contains
      # library X?" trail.
      # Equivalent CLI: syft sapphire-flow:ci-${{ github.sha }} -o cyclonedx-json > sbom.cdx.json
      - name: Generate SBOM with syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: sapphire-flow:ci-${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: false
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: error

  # Phase 11 — full end-to-end pipeline test (dedicated testcontainer, ~9 min).
  # Requires Docker for testcontainers (available on ubuntu-latest by default).
  # Gated on build-image-and-scan per Plan 064 B0 step 5 and B3 step 3.
