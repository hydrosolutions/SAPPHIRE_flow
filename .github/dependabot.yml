version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      # 48-hour soak: do not raise a PR for any new release until the version
      # has been published for at least 2 days. Protects against post-release
      # CVE disclosure, yanked releases, and supply-chain attacks that are
      # often caught and corrected within the first 24-48 hours.
      default-days: 2
    groups:
      uv-patch:
        patterns: ["*"]
        update-types: ["patch"]
    reviewers:
      - "mabesa"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
    groups:
      docker-patch:
        patterns: ["*"]
        update-types: ["patch"]
    reviewers:
      - "mabesa"

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
    groups:
      docker-compose-patch:
        patterns: ["*"]
        update-types: ["patch"]
    reviewers:
      - "mabesa"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
    groups:
      github-actions-patch:
        patterns: ["*"]
        update-types: ["patch"]
    reviewers:
      - "mabesa"
