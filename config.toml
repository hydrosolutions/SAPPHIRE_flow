# SAPPHIRE Flow — v0 Swiss deployment config
# See docs/spec/config-reference.toml for field documentation.

# Data retention
weather_hot_days = 180
forecast_hot_days = 548
max_retention_days = 3650

# Observation staleness
observation_staleness_warning_hours = 6.0

# NWP lateness
nwp_max_wait_hours = 3.0
nwp_max_fallback_age_hours = 12.0
# Plan 090: ignore an NWP cycle younger than this (min); walk back to the next
# older, fully-published slot. ~90-120 min = ICON-CH2-EPS publish latency.
nwp_cycle_min_age_minutes = 105
# Plan 095: hot window (days) for raw NWP grid-cube zarrs under
# nwp_grid_archive_base_path. Old cycles are pruned; extracted values in
# weather_forecasts remain the permanent archive. Must be
# >= ceil(nwp_max_fallback_age_hours / 24) + 1.
nwp_grid_retention_days = 3

# Per-source alert enablement
enable_forecast_alerts = false
enable_observation_alerts = false
enable_pipeline_alerts = false
threshold_check_mode = "raw"
alert_model_strategy = "primary"
min_operational_ensemble_size = 20
min_operational_quantile_levels = 7

# Warm-up state (conceptual models)
warm_up_snapshot_max_age_hours = 48.0
warm_up_snapshot_max_age_monsoon_hours = 24.0

# Flow regime
flow_regime_p50_percentile = 50.0
flow_regime_p90_percentile = 90.0

# Threshold inference
infer_missing_thresholds = false

# Skill promotion
min_skill_samples = 100
min_skill_seasons = 2

# Display
default_display_timezone = "Europe/Zurich"

# Calendar
calendar = "gregorian"


# Model assignment priority (Plan 089) — lower = preferred; tried first in the
# PRIMARY first-success fallback chain. Skill models must outrank the fallbacks
# so onboarding does not default them to a fallback. Any model not listed here
# gets DEFAULT_PRIORITY (50), a neutral tier between skill models and fallbacks.
[model_priorities]
nwp_regression = 10          # skill: weather + lags
nwp_rainfall_runoff = 20     # skill: weather-only
linear_regression_daily = 30 # conceptual/regression
persistence_fallback = 90    # fallback
climatology_fallback = 100   # last-resort fallback


[paths]
# data_dir = "/data"   # uncomment for production; override with SAPPHIRE_DATA_DIR env var

# Danger levels
[[danger_levels]]
level = 1
name = "Low"
color = "#FFFF00"
trigger_probability = 0.5
resolve_probability = 0.3
min_trigger_duration_hours = 0.0
min_resolve_duration_hours = 0.0
direction = "above"

[[danger_levels]]
level = 2
name = "Moderate"
color = "#FFA500"
trigger_probability = 0.5
resolve_probability = 0.3
min_trigger_duration_hours = 0.0
min_resolve_duration_hours = 0.0
direction = "above"

[[danger_levels]]
level = 3
name = "Considerable"
color = "#FF4500"
trigger_probability = 0.4
resolve_probability = 0.2
min_trigger_duration_hours = 0.0
min_resolve_duration_hours = 0.0
direction = "above"

[[danger_levels]]
level = 4
name = "High"
color = "#FF0000"
trigger_probability = 0.3
resolve_probability = 0.15
min_trigger_duration_hours = 0.0
min_resolve_duration_hours = 0.0
direction = "above"

[[danger_levels]]
level = 5
name = "Very High"
color = "#800000"
trigger_probability = 0.2
resolve_probability = 0.1
min_trigger_duration_hours = 0.0
min_resolve_duration_hours = 0.0
direction = "above"

# Seasons
[[seasons]]
name = "winter"
months = [11, 12, 1, 2, 3]

[[seasons]]
name = "summer"
months = [4, 5, 6, 7, 8, 9, 10]

# Skill interpretation
[[skill_interpretation]]
metric = "crpss"
time_step_hours = 24.0
[[skill_interpretation.bands]]
lower = -1e99
upper = 0.0
label = "no skill"
[[skill_interpretation.bands]]
lower = 0.0
upper = 0.1
label = "marginal"
[[skill_interpretation.bands]]
lower = 0.1
upper = 0.25
label = "useful"
[[skill_interpretation.bands]]
lower = 0.25
upper = 0.5
label = "good"
[[skill_interpretation.bands]]
lower = 0.5
upper = 1e99
label = "excellent"


