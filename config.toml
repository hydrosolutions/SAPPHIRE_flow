# Adapter configuration
[adapters.weather_forecast]
enabled = true
# v0 does not dispatch on type; the gate hardcodes MeteoSwissNwpAdapter.
type = "meteoswiss_nwp"
archive = true
max_cache_age_hours = 12
stac_base_url = "https://data.geo.admin.ch/api/stac/v1"
stac_collection = "ch.meteoschweiz.ogd-forecasting-icon-ch2"
archive_format = "zarr"
archive_base_path = "/data/nwp_grids"
scratch_path = "/tmp/sapphire_nwp"
# Plan 087: basin extractor for NWP forcing. "mesh" (default) handles the
# ICON-CH2-EPS unstructured triangular mesh via point-in-polygon; "exactextract"
# is the regular lat/lon raster path. Unknown values raise ConfigurationError.
grid_extractor = "mesh"
# Plan 086: optional hard cap on GRIB files fetched per cycle (operator escape
# hatch / sampled runs — caps members·steps, NOT a correctness control). Unset =
# unlimited (production default). A conservative cap belongs in the mac-mini
# overlay, not here.
# max_files = 42

[adapters.weather_forecast.monitoring]
expected_delivery_offset_hours = 5.0
expected_cycles_per_day = 4
provider_retention_days = 1
recovery_max_attempts = 3

# Plan 071: MeteoSwiss open-data daily reanalysis (historical_forcing ingest).
# Drives the scheduled `ingest-weather-history` deployment. STAC base url +
# collection only; defaults match these values when the section is absent.
[adapters.weather_reanalysis]
type = "meteoswiss_open_data_reanalysis"
stac_base_url = "https://data.geo.admin.ch/api/stac/v1"
stac_collection = "ch.meteoschweiz.ogd-surface-derived-grid"

[adapters.weather_stations]
type = "meteoswiss_smn"
max_cache_age_hours = 24

[adapters.weather_stations.monitoring]
expected_interval_hours = 0.17

[adapters.river_stations]
type = "hydro_scraper"
endpoint = "https://lindas.admin.ch/query"
max_cache_age_hours = 24

[adapters.river_stations.monitoring]
expected_interval_hours = 0.17


# Pipeline monitoring
[monitoring.forecast_cycle]
expected_interval_hours = 6.0


# Model weather source configuration
[models.lstm_daily.weather]
sources = [
  {nwp_source = "icon_ch2_eps", parameters = ["precipitation", "temperature", "snow_depth"], pipeline = ["extract_basin_avg"]},
]


# API configuration
[api.cors]
allow_origins = ["https://sapphire.example.ch"]
