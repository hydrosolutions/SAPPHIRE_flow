# docker-compose.staging.yml — adds the 5-station staging overlay on top of docker-compose.yml.
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml up
#
# See docs/plans/065-config-overlay-environment-variants.md T4/D8.

services:
  prefect-worker:
    environment:
      SAPPHIRE_CONFIG_OVERLAY: /app/config/overlays/staging-5-stations.toml
    volumes:
      - ./config/overlays/staging-5-stations.toml:/app/config/overlays/staging-5-stations.toml:ro

  api:
    environment:
      SAPPHIRE_CONFIG_OVERLAY: /app/config/overlays/staging-5-stations.toml
    volumes:
      - ./config/overlays/staging-5-stations.toml:/app/config/overlays/staging-5-stations.toml:ro

  init:
    environment:
      SAPPHIRE_CONFIG_OVERLAY: /app/config/overlays/staging-5-stations.toml
    volumes:
      - ./config/overlays/staging-5-stations.toml:/app/config/overlays/staging-5-stations.toml:ro
