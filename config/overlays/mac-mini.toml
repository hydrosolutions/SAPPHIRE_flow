enable_observation_alerts = true

# Plan 111 route-C BAFU forecast collector. Setting this path ENABLES the
# hourly collect-bafu-forecasts flow (gated: unset = no-op). Quarantined,
# host-persistent named volume (docker-compose.yml `bafu_forecast_archive`);
# evaluation-only, forward-only. Discard with `docker volume rm`.
[adapters.bafu_forecast]
archive_base_path = "/data/bafu_forecasts"

[adapters.weather_forecast]
enabled = true
# Plan 105 D2 — disk-guard thresholds (absolute free GB).
# Scratch = /tmp/sapphire_nwp (4 GiB tmpfs); archive = /data/nwp_grids volume.
disk_guard_scratch_soft_gb = 1.5
disk_guard_scratch_hard_gb = 0.5
disk_guard_archive_soft_gb = 8.0
disk_guard_archive_hard_gb = 3.0
